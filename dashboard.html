<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Dashboard Client – HAM Global Words</title>

  <link rel="stylesheet" href="assetes/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-mode">

<!-- HEADER -->
<header class="site-header">
  <div class="galaxy-bg"></div>

  <div class="header-content">
    <img src="assetes/img/logoHAM.png" class="logo" alt="HAM Global Words">

    <h1>📊 Espace Client</h1>
    <p>Suivi de vos projets linguistiques & digitaux</p>

    <a href="index.html" class="cta-btn">⬅ Retour site</a>
  </div>
</header>

<main>

<!-- USER INFO -->
<section>
  <h2>👤 Mon profil</h2>

  <div class="card">
    <p><strong>Email :</strong> <span id="userEmail"></span></p>
    <p><strong>Statut :</strong> Actif</p>
  </div>
</section>

<!-- UPLOAD -->
<section>
  <h2>📤 Envoyer un projet</h2>

  <form id="uploadForm" class="card">

    <input type="text" name="name" placeholder="Votre nom" required>
    <input type="email" name="email" placeholder="Votre email" required>

    <select name="service" required>
      <option value="">Choisissez un service</option>
      <option>Traduction</option>
      <option>Interprétation</option>
      <option>Annotation IA</option>
    </select>

    <input type="file" name="file" required>

    <textarea name="message" placeholder="Instructions..." required></textarea>

    <button type="submit">🚀 Envoyer</button>

  </form>
</section>

<!-- PROJECTS -->
<section>
  <h2>📁 Mes projets</h2>
  <div id="projectsList" class="service-grid"></div>
</section>

<!-- ACTIONS -->
<section>
  <h2>⚡ Actions rapides</h2>

  <div class="service-grid">

    <a href="mailto:hamadineagmoctar@gmail.com" class="service-btn">
      📩 Support
    </a>

    <a href="index.html#contact" class="service-btn">
      ➕ Nouveau projet
    </a>

    <a href="login.html" class="service-btn">
      🔐 Déconnexion
    </a>

  </div>
</section>

</main>

<footer class="footer">
  <p>© <span id="year"></span> HAM Global Words</p>
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBwh9xj4t2QKzfgY3VvzW4Cai3VsDWjmDc",
  authDomain: "ham-global-words.firebaseapp.com",
  projectId: "ham-global-words",
  storageBucket: "ham-global-words.firebasestorage.app",
  messagingSenderId: "207685512003",
  appId: "1:207685512003:web:3c281456eddfdece425df6"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);
const db = getFirestore(app);

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("userEmail").textContent = user.email;
    loadProjects();
  }
});

// FORM
const form = document.getElementById("uploadForm");
const projectsList = document.getElementById("projectsList");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = form.file.files[0];
  if (!file) return alert("Ajoute un fichier");

  const fileName = Date.now() + "_" + file.name;
  const storageRef = ref(storage, "uploads/" + fileName);

  try {
    await uploadBytes(storageRef, file);

    await addDoc(collection(db, "projects"), {
      name: form.name.value,
      email: form.email.value,
      service: form.service.value,
      message: form.message.value,
      fileName: fileName,
      date: new Date()
    });

    alert("✅ Projet envoyé !");
    form.reset();
    loadProjects();

  } catch (err) {
    console.error(err);
    alert("❌ Erreur");
  }
});

// LOAD PROJECTS
async function loadProjects() {
  projectsList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "projects"));

  snapshot.forEach(doc => {
    const data = doc.data();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${data.service}</h3>
      <p><strong>Client :</strong> ${data.name}</p>
      <p><strong>Email :</strong> ${data.email}</p>
      <p><strong>Fichier :</strong> ${data.fileName}</p>
      <p>${data.message}</p>
    `;

    projectsList.appendChild(card);
  });
}

// YEAR
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
