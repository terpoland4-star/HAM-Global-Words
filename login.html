<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - HAM Global Words</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assetes/css/style.css">
  <link rel="icon" href="assetes/img/logo.png">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      max-width: 450px;
      width: 100%;
      padding: 2.5rem;
    }
    .auth-card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-home {
      display: inline-block;
      margin-top: 1rem;
      color: var(--accent-primary);
    }
  </style>
</head>
<body class="dark-mode">

<div class="lang-switcher">
  <select id="langSwitcher" aria-label="Changer la langue">
    <option value="fr">🇫🇷 Français</option>
    <option value="en">🇬🇧 English</option>
    <option value="ar">🇸🇦 العربية</option>
  </select>
</div>

<button id="themeToggle" aria-label="Changer le thème">🌙</button>

<div class="auth-container">
  <div class="card auth-card">
    <h2 data-key="login_title">🔐 Connexion</h2>
    
    <form id="loginForm">
      <input type="email" name="email" data-placeholder="form_email" placeholder="Votre email" required>
      <input type="password" name="password" data-placeholder="login_password" placeholder="Mot de passe" required>
      <button type="submit" data-key="login_btn">Se connecter</button>
    </form>
    
    <div class="auth-footer">
      <p data-key="register_prompt">Pas encore de compte ?</p>
      <a href="register.html" class="cta-btn secondary" data-key="register_link">Créer un compte</a>
      <br>
      <a href="index.html" class="back-home" data-key="back_home">← Retour à l'accueil</a>
    </div>
  </div>
</div>

<script src="assetes/js/app.js" defer></script>

<script>
  // Traductions spécifiques pour login
  const loginTranslations = {
    fr: { login_password: "Mot de passe", login_btn: "Se connecter", register_prompt: "Pas encore de compte ?", register_link: "Créer un compte", back_home: "← Retour à l'accueil" },
    en: { login_password: "Password", login_btn: "Login", register_prompt: "Don't have an account yet?", register_link: "Create an account", back_home: "← Back to home" },
    ar: { login_password: "كلمة المرور", login_btn: "تسجيل الدخول", register_prompt: "ليس لديك حساب؟", register_link: "إنشاء حساب", back_home: "← العودة إلى الرئيسية" }
  };
  
  function applyLoginLanguage(lang) {
    const dict = loginTranslations[lang] || loginTranslations.fr;
    document.querySelector('[data-placeholder="login_password"]')?.setAttribute('placeholder', dict.login_password);
    document.querySelector('[data-key="login_btn"]') && (document.querySelector('[data-key="login_btn"]').textContent = dict.login_btn);
    document.querySelector('[data-key="register_prompt"]') && (document.querySelector('[data-key="register_prompt"]').textContent = dict.register_prompt);
    document.querySelector('[data-key="register_link"]') && (document.querySelector('[data-key="register_link"]').textContent = dict.register_link);
    document.querySelector('[data-key="back_home"]') && (document.querySelector('[data-key="back_home"]').textContent = dict.back_home);
  }
  
  const lang = localStorage.getItem('lang') || 'fr';
  applyLoginLanguage(lang);
  
  document.getElementById('langSwitcher')?.addEventListener('change', (e) => {
    localStorage.setItem('lang', e.target.value);
    applyLoginLanguage(e.target.value);
  });
</script>

</body>
</html>
